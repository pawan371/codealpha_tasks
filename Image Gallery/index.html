<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Image Gallery</h1>

    <div class="gallery">
        <img src="image/download (1).jpeg" class="gallery-img">
         <img src="image/download (2).jpeg" class="gallery-img">
          <img src="image/download (3).jpeg" class="gallery-img">
           <img src="image/download (4).jpeg" class="gallery-img">
            <img src="image/download.jpeg" class="gallery-img">
             <img src="image/download.png" class="gallery-img">
              <img src="image/images.jpeg" class="gallery-img">
    </div>

    <!--Lightbox-->

    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-img" id="lightbox-img">
        <button id="prev">Prev</button>
        <button id="next">Next</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
